<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI-powered document processing — extract structured data from invoices, PDFs, and images." />
    <title>DocProcessor — AI Document Extraction</title>

    <!-- Google Fonts: Inter (body text) + JetBrains Mono (raw text panel) -->
    <!-- Loaded async so they do not block page render -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-gray-50 text-gray-900 antialiased">
    <!-- React mounts here. Everything inside is replaced by the React tree. -->
    <div id="root"></div>

    <!-- Vite injects the compiled JS bundle here at build time -->
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
