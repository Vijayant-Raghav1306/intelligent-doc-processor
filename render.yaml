# ─────────────────────────────────────────────────────────────────────────────
# render.yaml — Render deployment configuration (Docker mode)
#
# Previously we used `runtime: python` with a buildCommand that ran apt-get.
# That FAILED because Render's standard Python build environment blocks apt-get.
#
# SOLUTION: Switch to `env: docker`.
#
# How Docker mode works on Render:
#   1. You push your code (including Dockerfile) to GitHub.
#   2. Render detects `env: docker` in this file.
#   3. Render runs: docker build -t <your-service> .
#      → Tesseract and all system packages are installed during THIS step.
#      → Docker gives us full root access during the build → apt-get works!
#   4. Render runs the container, injecting $PORT as an env var.
#   5. Our CMD reads $PORT and starts uvicorn on the correct port.
#
# No buildCommand or startCommand needed here — the Dockerfile handles both.
#
# Docs: https://render.com/docs/docker
# ─────────────────────────────────────────────────────────────────────────────

services:
  - type: web
    name: intelligent-doc-processor

    # ── Docker mode ────────────────────────────────────────────────────────────
    # Tells Render: "build from Dockerfile, not from a language runtime"
    env: docker

    # Plan: free tier (512 MB RAM, shared CPU, sleeps after 15 min inactivity)
    # Upgrade to "starter" ($7/mo) for always-on + dedicated CPU
    plan: free

    # ── Docker image config ────────────────────────────────────────────────────
    # dockerfilePath defaults to ./Dockerfile — no need to specify unless
    # your Dockerfile lives in a subdirectory.
    # dockerfilePath: ./Dockerfile   ← uncomment only if needed

    # ── Health check ──────────────────────────────────────────────────────────
    # Render pings GET /health after deploy.
    # Returns 200 + JSON → Render marks the deploy as successful.
    # Returns non-200 or times out → Render rolls back to the previous deploy.
    healthCheckPath: /health

    # ── Environment variables ─────────────────────────────────────────────────
    # These are set inside the running container.
    # Render merges these with any vars you set in the dashboard.
    #
    # IMPORTANT: Do NOT put secrets here (API keys, passwords, etc.).
    # Add secrets via the Render dashboard → Environment tab.
    # They are encrypted at rest and never appear in your git history.
    envVars:
      # Path to the tesseract binary.
      # After apt-get install tesseract-ocr, the binary is on $PATH as "tesseract"
      - key: TESSERACT_CMD
        value: tesseract

      # spaCy English NER model (downloaded into the image during Docker build)
      - key: SPACY_MODEL
        value: en_core_web_sm

      # Maximum upload size in megabytes
      - key: MAX_FILE_SIZE_MB
        value: "10"

      # Runtime directories (created automatically at app startup)
      # NOTE: These are EPHEMERAL on Render — reset on every redeploy.
      # For persistent storage, use Render Disks or an S3-compatible bucket.
      - key: UPLOAD_DIR
        value: uploads

      - key: OUTPUT_DIR
        value: outputs
